<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAW CUT | PRODUCTION HOUSE</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;900&display=swap');

        body {
            margin: 0;
            background-color: #ffffff;
            color: #000000;
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
            padding: 0 5vw; 
            box-sizing: border-box;
        }

        nav {
            padding: 40px 0; 
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky; 
            top: 0;
            width: 100%;
            z-index: 1000;
            background: #fff;
        }

        .logo { 
            font-size: 1.2rem; 
            font-weight: 900; 
            letter-spacing: 2px;
            text-decoration: none;
            color: #000;
        }

        .nav-links a { 
            color: #000; 
            text-decoration: none; 
            margin-left: 30px; 
            font-size: 0.7rem; 
            letter-spacing: 1px;
        }

        .hero {
            height: 40vh;
            display: flex;
            justify-content: flex-start; 
            align-items: center;
        }

        h1 {
            font-size: 6vw;
            font-weight: 900;
            margin: 0;
            line-height: 1;
        }

        .work-section { padding-bottom: 100px; }
        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr); 
            gap: 30px;
        }

        .item-container {
            margin-bottom: 20px;
        }

        .item {
            background-color: #f0f0f0;
            aspect-ratio: 16/9;
            overflow: hidden;
            position: relative;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            filter: grayscale(100%);
            transition: 0.5s;
        }

        .item:hover iframe {
            filter: grayscale(0%);
        }

        .project-info {
            margin-top: 12px;
            font-size: 0.65rem;
            letter-spacing: 1px;
            color: #888;
            text-transform: uppercase;
        }

        footer {
            padding: 100px 0;
            border-top: 1px solid #eee;
        }

        .footer-text {
            font-size: 2.5rem;
            font-weight: 300;
            margin-bottom: 40px;
        }

        .contact-link { color: #000; font-weight: 400; }

        @media (max-width: 1024px) {
            .grid { grid-template-columns: repeat(2, 1fr); }
            body { padding: 0 5vw; }
        }

        @media (max-width: 768px) {
            .grid { grid-template-columns: 1fr; }
            h1 { font-size: 12vw; }
        }
    </style>
</head>
<body>

    <nav>
        <a href="#" class="logo">RAW CUT</a>
        <div class="nav-links">
            <a href="#work">WORK</a>
            <a href="#contact">CONTACT</a>
        </div>
    </nav>

    <section class="hero">
        <h1>RAW CUT<br>PRODUCTION</h1>
    </section>

    <section class="work-section" id="work">
        <div class="grid">
            <div class="item-container">
                <div class="item">
                    <iframe src="https://drive.google.com/file/d/1XqfbrGgjwAEc4UhK4zyu6lBQ0iprdTkJ/preview"></iframe>
                </div>
                <div class="project-info">MUSIC VIDEO / 2026 / ARTIST NAME</div>
            </div>

            <div class="item-container">
                <div class="item">
                    <iframe src="https://drive.google.com/file/d/1XqfbrGgjwAEc4UhK4zyu6lBQ0iprdTkJ/preview"></iframe>
                </div>
                <div class="project-info">COMMERCIAL / 2026 / BRAND NAME</div>
            </div>

            <div class="item-container">
                <div class="item">
                    <iframe src="https://drive.google.com/file/d/1XqfbrGgjwAEc4UhK4zyu6lBQ0iprdTkJ/preview"></iframe>
                </div>
                <div class="project-info">FASHION FILM / 2026 / PROJECT NAME</div>
            </div>
        </div>
    </section>

    <footer id="contact">
        <div class="footer-text">
            HIRE US FOR YOUR <br>NEXT PROJECT. <br>
            <a href="mailto:your-email@gmail.com" class="contact-link">SAY HELLO</a>
        </div>
        <p style="font-size: 0.6rem; color: #ccc;">© 2026 RAW CUT. ALL RIGHTS RESERVED.</p>
    </footer>

</body>
</html>
