<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAW CUT | Production House</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@900&display=swap');

        body {
            margin: 0;
            background-color: #0a0a0a;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            text-transform: uppercase;
            overflow-x: hidden;
        }

        /* Navigation */
        nav {
            padding: 30px;
            display: flex;
            justify-content: space-between;
            position: fixed;
            width: 100%;
            box-sizing: border-box;
            z-index: 100;
            background: linear-gradient(to bottom, rgba(10,10,10,1), rgba(10,10,10,0));
        }

        .logo { font-size: 1.5rem; letter-spacing: -1px; font-weight: 900; }
        .nav-links a { color: #fff; text-decoration: none; margin-left: 20px; font-size: 0.8rem; opacity: 0.7; }
        .nav-links a:hover { opacity: 1; }

        /* Hero Section */
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: radial-gradient(circle, #1a1a1a 0%, #0a0a0a 100%);
        }

        h1 {
            font-size: 15vw;
            line-height: 0.8;
            margin: 0;
            letter-spacing: -5px;
        }

        .tagline {
            margin-top: 20px;
            font-size: 1.2rem;
            letter-spacing: 5px;
            font-weight: 300;
            color: #444;
        }

        /* Work Grid */
        .work-section { padding: 100px 30px; }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 20px;
        }
        .item {
            aspect-ratio: 16/9;
            background-color: #1a1a1a;
            border: 1px solid #333;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.4s;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }
        .item:hover { border-color: #fff; transform: scale(0.98); }
        .item::after { content: 'PLAY'; font-size: 0.7rem; opacity: 0; transition: 0.3s; }
        .item:hover::after { opacity: 1; }

        /* Footer */
        footer {
            padding: 100px 30px;
            text-align: center;
            border-top: 1px solid #1a1a1a;
        }
        .contact-btn {
            padding: 20px 50px;
            border: 1px solid #fff;
            color: #fff;
            text-decoration: none;
            display: inline-block;
            transition: 0.3s;
        }
        .contact-btn:hover { background: #fff; color: #000; }
    </style>
</head>
<body>

    <nav>
        <div class="logo">RAW CUT</div>
        <div class="nav-links">
            <a href="#work">WORK</a>
            <a href="#contact">CONTACT</a>
        </div>
    </nav>

    <section class="hero">
        <h1>RAW<br>CUT</h1>
        <p class="tagline">RAW IDEAS. SHARP CUTS.</p>
    </section>

    <section class="work-section" id="work">
       <div class="item">
    <iframe 
        src="https://drive.google.com/file/d/1XqfbrGgjwAEc4UhK4zyu6lBQ0iprdTkJ/preview" 
        width="100%" 
        height="100%" 
        frameborder="0" 
        allow="autoplay">
    </iframe>
</div>
    </section>

    <footer id="contact">
        <p>START A PROJECT</p>
        <a href="mailto:nick@rawcut.com" class="contact-btn">GET IN TOUCH</a>
        <p style="margin-top: 50px; font-size: 0.6rem; color: #333;">© 2026 RAW CUT PRODUCTION. ALL RIGHTS RESERVED.</p>
    </footer>

</body>
</html>
