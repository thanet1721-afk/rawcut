<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAW CUT | Production House</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@900&display=swap');

        body {
            margin: 0;
            background-color: #0a0a0a;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            text-transform: uppercase;
            overflow-x: hidden;
        }

        /* Navigation */
        nav {
            padding: 30px;
            display: flex;
            justify-content: space-between;
            position: fixed;
            width: 100%;
            box-sizing: border-box;
            z-index: 100;
            background: linear-gradient(to bottom, rgba(10,10,10,1), rgba(10,10,10,0));
        }

        .logo { font-size: 1.5rem; letter-spacing: -1px; font-weight: 900; }
        .nav-links a { color: #fff; text-decoration: none; margin-left: 20px; font-size: 0.8rem; opacity: 0.7; }
        .nav-links a:hover { opacity: 1; }

        /* Hero Section */
        .hero {
            height: 60vh; /* ปรับให้เตี้ยลงหน่อยเพื่อโชว์งานเร็วขึ้น */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        h1 {
            font-size: 10vw;
            line-height: 0.8;
            margin: 0;
            letter-spacing: -5px;
        }

        .tagline {
            margin-top: 20px;
            font-size: 1rem;
            letter-spacing: 5px;
            font-weight: 300;
            color: #444;
        }

        /* Work Grid - บังคับ 5 คอลัมน์ */
        .work-section { padding: 50px 15px; }
        .grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr); /* แถวละ 5 คลิป */
            gap: 10px;
        }

        .item {
            aspect-ratio: 16/9;
            background-color: #1a1a1a;
            border: 1px solid #333;
            position: relative;
            overflow: hidden;
            transition: 0.3s;
        }

        .item:hover { border-color: #fff; transform: scale(1.02); z-index: 10; }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* สำหรับหน้าจอมือถือและแท็บเล็ต */
        @media (max-width: 1200px) {
            .grid { grid-template-columns: repeat(3, 1fr); } /* จอกลางเหลือ 3 */
        }
        @media (max-width: 768px) {
            h1 { font-size: 20vw; }
            .grid { grid-template-columns: repeat(2, 1fr); } /* มือถือเหลือ 2 */
        }

        /* Footer */
        footer {
            padding: 80px 30px;
            text-align: center;
            border-top: 1px solid #1a1a1a;
        }
        .contact-btn {
            padding: 15px 40px;
            border: 1px solid #fff;
            color: #fff;
            text-decoration: none;
            display: inline-block;
            transition: 0.3s;
            font-size: 0.8rem;
        }
        .contact-btn:hover { background: #fff; color: #000; }
    </style>
</head>
<body>
