<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAW CUT | PRODUCTION HOUSE</title>
    <style>
        /* เน้นฟอนต์ที่ดูสะอาดและแพง */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;900&display=swap');

        body {
            margin: 0;
            background-color: #ffffff; /* เปลี่ยนเป็นพื้นขาวแบบชายหนัง หรือจะใช้ดำก็ได้ */
            color: #000000;
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        /* Navigation - เรียบแต่หรู */
        nav {
            padding: 40px 60px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: fixed;
            width: 100%;
            box-sizing: border-box;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
        }

        .logo { 
            font-size: 1.2rem; 
            font-weight: 900; 
            letter-spacing: 2px;
            text-decoration: none;
            color: #000;
        }

        .nav-links a { 
            color: #000; 
            text-decoration: none; 
            margin-left: 40px; 
            font-size: 0.7rem; 
            font-weight: 400;
            letter-spacing: 2px;
            transition: opacity 0.3s;
        }

        .nav-links a:hover { opacity: 0.5; }

        /* Hero Section - เน้นความกว้าง */
        .hero {
            height: 80vh;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding-top: 100px;
        }

        h1 {
            font-size: 8vw;
            font-weight: 900;
            letter-spacing: -2px;
            margin: 0;
            line-height: 0.9;
        }

        /* Work Grid - แถวละ 3 แบบหรูๆ (ชายหนังไม่ใช้ 5 เพราะมันดูแน่นไป) */
        .work-section { padding: 0 60px 100px 600x; }
        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr); /* ปรับเหลือ 3 เพื่อความ Cinematic */
            gap: 40px;
        }

        .item {
            position: relative;
            background-color: #f5f5f5;
            aspect-ratio: 16/9;
            overflow: hidden;
            transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .item:hover {
            transform: scale(1.02);
        }

        .item iframe {
            width: 100%;
            height: 100%;
            border: none;
            filter: grayscale(100%); /* เริ่มต้นเป็นขาวดำแบบอาร์ตๆ */
            transition: filter 0.5s;
        }

        .item:hover iframe {
            filter: grayscale(0%); /* พอเอาเม้าส์วางค่อยมีสี */
        }

        /* Project Info */
        .project-info {
            margin-top: 15px;
            font-size: 0.65rem;
            letter-spacing: 1px;
            font-weight: 400;
            color: #666;
            text-transform: uppercase;
        }

        /* Footer */
        footer {
            padding: 100px 60px;
            border-top: 1px solid #eee;
            text-align: left;
        }

        .footer-text {
            font-size: 2rem;
            font-weight: 300;
            line-height: 1.2;
            max-width: 600px;
        }

        .contact-link {
            color: #000;
            text-decoration: underline;
            font-weight: 400;
        }

        /* Responsive */
        @media (max-width: 1024px) {
            .grid { grid-template-columns: repeat(2, 1fr); }
            nav { padding: 30px; }
            .work-section { padding: 0 30px 100px 30px; }
        }

        @media (max-width: 768px) {
            .grid { grid-template-columns: repeat(1, 1fr); }
            h1 { font-size: 15vw; }
        }
    </style>
</head>
<body>

    <nav>
        <a href="#" class="logo">RAW CUT</a>
        <div class="nav-links">
            <a href="#work">PROJECTS</a>
            <a href="#contact">CONTACT</a>
        </div>
    </nav>

    <section class="hero">
        <div>
            <h1>PRODUCTION HOUSE</h1>
            <p style="letter-spacing: 10px; font-weight: 300; font-size: 0.7rem; margin-top: 20px; color: #888;">BANGKOK / BASED</p>
        </div>
    </section>

    <section class="work-section" id="work">
        <div class="grid">
            <div>
                <div class="item">
                    <iframe src="https://drive.google.com/file/d/1XqfbrGgjwAEc4UhK4zyu6lBQ0iprdTkJ/preview"></iframe>
                </div>
                <div class="project-info">Music Video / 2026 / Artist Name</div>
            </div>

            <div>
                <div class="item">
                    <iframe src="https://drive.google.com/file/d/1XqfbrGgjwAEc4UhK4zyu6lBQ0iprdTkJ/preview"></iframe>
                </div>
                <div class="project-info">TVC / 2026 / Brand Name</div>
            </div>

            <div>
                <div class="item">
                    <iframe src="https://drive.google.com/file/d/1XqfbrGgjwAEc4UhK4zyu6lBQ0iprdTkJ/preview"></iframe>
                </div>
                <div class="project-info">Commercial / 2026 / Project Name</div>
            </div>
        </div>
    </section>

    <footer id="contact">
        <div class="footer-text">
            LET'S CREATE SOMETHING <br>
            RAW AND UNFORGETTABLE. <br>
            <a href="mailto:your-email@gmail.com" class="contact-link">SAY HELLO</a>
        </div>
        <p style="margin-top: 60px; font-size: 0.6rem; color: #ccc;">© 2026 RAW CUT. ALL RIGHTS RESERVED.</p>
    </footer>

</body>
</html>
